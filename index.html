<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="決策團">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#4DA3FF; --blue-bright:#6FB8FF; --gold:#C9A050;
    --ink:#EAF1FF; --ink-soft:#9FB6DD; --ink-dim:#6B82A8;
    --panel:rgba(28,52,98,.45); --panel-line:rgba(120,170,255,.28);
    --r:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{font-family:"Noto Sans TC",system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink)}
  body{
    max-width:520px;margin:0 auto;min-height:100vh;position:relative;
    background:
      radial-gradient(ellipse 80% 50% at 50% -8%, rgba(40,90,200,.32), transparent 60%),
      radial-gradient(ellipse 55% 38% at 92% 28%, rgba(30,80,180,.22), transparent 55%),
      radial-gradient(ellipse 55% 38% at 8% 72%, rgba(20,60,150,.20), transparent 55%),
      linear-gradient(180deg,#0a1628,#060d1c 60%,#040815);
    background-attachment:fixed;
  }

  /* ===== 視圖切換 ===== */
  .view{display:none;animation:fade .35s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ===== 通用發光面板 ===== */
  .glass{position:relative;border-radius:var(--r);overflow:hidden;
    background:linear-gradient(155deg,rgba(56,96,176,.28),rgba(16,34,68,.5));
    border:1px solid var(--panel-line);
    box-shadow:0 6px 22px rgba(4,10,28,.45), inset 0 1px 0 rgba(170,200,255,.15), inset 0 0 30px rgba(60,120,230,.07);
    backdrop-filter:blur(5px)}

  /* ===== 頂部 bar ===== */
  header{position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,rgba(8,16,32,.9),rgba(8,16,32,.55));
    backdrop-filter:blur(12px);border-bottom:1px solid rgba(120,170,255,.14)}
  .bar{display:flex;align-items:center;gap:12px;padding:13px 18px;min-height:56px}
  .back{font-size:15px;color:var(--ink-soft);background:none;border:none;font-family:inherit;cursor:pointer;display:none;align-items:center;gap:3px;font-weight:500}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .logo{width:30px;height:30px;flex:none}
  .brand h1{font-size:16px;font-weight:700;letter-spacing:.04em;line-height:1}
  .brand .en{font-size:8.5px;letter-spacing:.32em;color:var(--blue);font-weight:500;margin-top:3px}

  /* ===== 圖示通用發光 ===== */
  .gi{filter:drop-shadow(0 0 5px rgba(90,160,255,.85)) drop-shadow(0 0 12px rgba(60,120,240,.45))}
  .gi svg [stroke="#C9A050"]{filter:drop-shadow(0 0 4px rgba(220,180,90,.8))}

  /* =========================================================
     視圖一:介紹頁(封面)
     ========================================================= */
  #intro{padding:0}
  .intro-wrap{min-height:100vh;display:flex;flex-direction:column;padding:46px 22px 30px;position:relative}
  .intro-title{text-align:center;font-size:38px;font-weight:900;line-height:1.28;letter-spacing:.01em;
    text-shadow:0 0 24px rgba(90,150,255,.5)}
  .intro-title .hl{color:var(--blue);text-shadow:0 0 22px rgba(77,163,255,.9)}
  .intro-sub{text-align:center;color:var(--ink-soft);font-size:15px;margin-top:16px;letter-spacing:.06em;font-weight:500}
  .intro-phone{flex:1;display:grid;place-items:center;margin:26px 0}
  .intro-badges{display:flex;justify-content:space-around;gap:8px;margin-top:8px}
  .ib{text-align:center;flex:1}
  .ib .ic{width:34px;height:34px;margin:0 auto 7px}
  .ib b{display:block;font-size:13px;font-weight:700;color:var(--ink)}
  .ib span{font-size:10.5px;color:var(--ink-dim);line-height:1.5;display:block;margin-top:2px}
  .enter-btn{margin-top:24px;width:100%;border:none;font-family:inherit;cursor:pointer;
    background:linear-gradient(135deg,#2E7BE8,#4DA3FF);color:#fff;font-size:16px;font-weight:700;
    padding:16px;border-radius:100px;letter-spacing:.04em;
    box-shadow:0 8px 26px rgba(45,110,232,.5),inset 0 1px 0 rgba(255,255,255,.3)}
  .enter-btn:active{transform:scale(.98)}

  /* 介紹頁中央的迷你手機示意 */
  .phone-mock{width:230px;border-radius:30px;padding:9px;
    background:linear-gradient(160deg,#2a3550,#0d1424);
    box-shadow:0 20px 50px rgba(0,0,0,.55),0 0 40px rgba(60,120,230,.25),inset 0 1px 0 rgba(180,210,255,.2)}
  .phone-screen{border-radius:23px;overflow:hidden;background:#0a1424;aspect-ratio:9/17.5;
    display:flex;flex-direction:column;position:relative;border:1px solid rgba(120,170,255,.2)}
  .pm-notch{height:18px;display:flex;justify-content:center;align-items:flex-start;padding-top:5px}
  .pm-notch::after{content:"";width:54px;height:6px;border-radius:10px;background:#000}
  .pm-body{flex:1;padding:8px 11px;overflow:hidden}
  .pm-h{font-size:11px;font-weight:700;text-align:center;margin-bottom:2px}
  .pm-h .hl{color:var(--blue)}
  .pm-sub{font-size:6.5px;color:var(--ink-soft);text-align:center;margin-bottom:7px}
  .pm-stats{display:flex;justify-content:space-around;background:rgba(10,22,44,.7);border:1px solid var(--panel-line);border-radius:9px;padding:6px 2px;margin-bottom:7px}
  .pm-stats div{text-align:center}
  .pm-stats b{font-size:11px;color:var(--blue);display:block;line-height:1}
  .pm-stats span{font-size:5.5px;color:var(--ink-soft)}
  .pm-grid{background:rgba(240,245,255,.96);border-radius:9px;padding:7px;flex:1}
  .pm-grid .gt{font-size:6.5px;color:#33415c;font-weight:700;margin-bottom:5px}
  .pm-cells{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
  .pm-cell{background:#fff;border-radius:6px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .pm-cell .pmi{width:15px;height:15px}
  .pm-cell .pmi svg [stroke="#4DA3FF"]{stroke:#2E7BE8}
  .pm-cell span{font-size:4.5px;color:#44506a;text-align:center;line-height:1.2}

  /* =========================================================
     視圖二:主頁(四大類入口)
     ========================================================= */
  #home{padding:8px 0 40px}
  .home-hero{text-align:center;padding:14px 22px 4px}
  .home-hero h2{font-size:23px;font-weight:900;line-height:1.3;text-shadow:0 0 20px rgba(90,150,255,.45)}
  .home-hero h2 .hl{color:var(--blue);text-shadow:0 0 20px rgba(77,163,255,.85)}
  .home-hero p{color:var(--ink-soft);font-size:12.5px;margin-top:7px;letter-spacing:.04em}
  /* 圓桌氛圍圖(精緻橫幅) */
  .council{margin:12px 14px 0;border-radius:var(--r);overflow:hidden;position:relative;border:1px solid var(--panel-line);
    box-shadow:0 0 26px rgba(60,120,230,.18);height:120px}
  .council img{width:100%;height:100%;object-fit:cover;object-position:center 30%;display:block;opacity:.9}
  .council::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,13,28,.15) 40%,rgba(6,13,28,.95))}
  .council .cap{position:absolute;left:0;right:0;bottom:11px;text-align:center;font-size:12px;color:var(--ink);font-weight:600;letter-spacing:.05em;z-index:2;text-shadow:0 1px 6px #000}
  /* 數據卡 */
  .stats-card{margin:12px 14px;padding:14px 10px;display:flex;justify-content:space-around}
  .stats-card div{text-align:center}
  .stats-card b{font-size:26px;font-weight:900;color:var(--blue);display:block;line-height:1;text-shadow:0 0 14px rgba(77,163,255,.7)}
  .stats-card span{font-size:11px;color:var(--ink-soft);margin-top:5px;display:block}
  /* 四大類標題 */
  .sec-title{display:flex;align-items:center;gap:9px;padding:10px 22px 10px}
  .sec-title .dot{width:8px;height:8px;border-radius:2px;background:var(--blue);box-shadow:0 0 8px var(--blue)}
  .sec-title h3{font-size:15px;font-weight:700;letter-spacing:.04em}
  /* 四大類卡片 */
  .cats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px}
  .cat{position:relative;border-radius:var(--r);overflow:hidden;cursor:pointer;padding:20px 16px 18px;min-height:128px;
    display:flex;flex-direction:column;justify-content:space-between;
    background:linear-gradient(155deg,rgba(56,96,176,.3),rgba(16,34,68,.52));
    border:1px solid var(--panel-line);
    box-shadow:0 6px 22px rgba(4,10,28,.45),inset 0 1px 0 rgba(170,200,255,.15);
    transition:transform .15s,box-shadow .2s}
  .cat:active{transform:scale(.97)}
  .cat .halo{position:absolute;top:24px;right:18px;width:60px;height:60px;border-radius:50%;
    background:radial-gradient(circle,rgba(80,150,255,.4),transparent 70%);filter:blur(8px);
    animation:breathe 3.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:1;transform:scale(1.12)}}
  .cat .ci{width:42px;height:42px;position:relative}
  .cat .cname{font-size:19px;font-weight:900;letter-spacing:.06em;position:relative}
  .cat .cdesc{font-size:11px;color:var(--ink-soft);margin-top:3px;position:relative}
  .cat .ccount{position:absolute;top:16px;right:16px;font-size:11px;font-weight:700;color:var(--blue);
    background:rgba(10,22,44,.6);padding:3px 9px;border-radius:100px;border:1px solid var(--panel-line);z-index:2}

  .chief{margin:6px 14px 0;border-radius:var(--r);padding:20px 18px;display:none;position:relative;overflow:hidden;
    background:linear-gradient(150deg,rgba(45,110,232,.92),rgba(30,75,180,.92));

  .chief .cnm{font-size:16px;font-weight:700;color:#fff}
  .chief .crl{font-size:12px;color:rgba(255,255,255,.85);margin-top:2px}
  .chief .cbody{margin-top:14px;font-size:14px;line-height:1.85;color:#fff}

  footer{text-align:center;color:var(--ink-dim);font-size:11px;padding:28px 24px 14px;line-height:1.8}

  /* ===== key modal ===== */
  .modal{position:fixed;inset:0;background:rgba(4,10,24,.72);backdrop-filter:blur(6px);z-index:50;display:none;align-items:flex-end;justify-content:center}

  .sheet{width:100%;max-width:520px;border-radius:24px 24px 0 0;padding:24px 22px calc(24px + env(safe-area-inset-bottom));animation:up .3s ease;
    background:linear-gradient(180deg,#16294d,#0c1730);border-top:1px solid var(--panel-line)}

  .sheet h3{font-size:18px;font-weight:700;color:#fff}

  .sheet a{color:var(--blue)}

    background:rgba(8,16,32,.6);color:var(--ink)}
  .sheet input:focus{border-color:var(--blue)}
  .sheet .acts{display:flex;gap:10px;margin-top:16px}
  .sheet button{flex:1;font-family:inherit;font-weight:700;font-size:14px;padding:13px;border-radius:12px;cursor:pointer;
    border:1px solid var(--panel-line);background:transparent;color:var(--ink)}

</style>

function getKey(){return localStorage.getItem(KEY)||''}
function getDeviceId(){

function openCategory(c){
  let teams='';
  c.teams.forEach(t=>{
    teams+=`<div class="team" data-team="${t.id}"><div class="halo"></div><div class="ti gi">${ICONS[t.id]}</div><div class="tn">${t.name}</div><div class="tm">${t.experts.length} 位顧問</div></div>`;
  });
  $('#catTeams').innerHTML=`
  <div class="ct-head"><div class="ci gi">${CAT_ICONS[c.id]}</div><div><h2>${c.name}</h2><p>${c.teams.length} 個專家團 · ${CAT_DESC[c.id]}</p></div></div>
  <div class="teams">${teams}</div>
  <footer>選一個專家團,提出你的問題</footer>`;
  $('#catTeams .ct-head .ci svg [stroke]')&&$('#catTeams').querySelectorAll('.ct-head .ci svg [stroke]').forEach(n=>{if(n.getAttribute('stroke')!=='#C9A050')n.setAttribute('stroke',COLORS[c.id])});
  c.teams.forEach(t=>{ $('#catTeams .team[data-team="'+t.id+'"]').onclick=()=>openTeam(c,t); });
  switchTo('catTeams', c.name, c.name+'領域');
}

let CUR=null;
function openTeam(cat,t){
  let cardsHtml='';
  t.experts.forEach((e,i)=>{
    cardsHtml+=`<div class="ecard glass" data-i="${i}">
      <div class="top"><div class="ava">${e.name.slice(0,1)}</div>

        <span class="tag">${e.tag}</span></div>

  });
  $('#team').innerHTML=`
  <div class="detail-head"><div class="ti gi">${ICONS[t.id]}</div><h2>${t.name}</h2><p>${cat.name}領域 · ${t.experts.length} 位代表顧問</p></div>

  bindAsk();
  switchTo('team', t.name, cat.name+'領域');
}

let busy=false;
function personaPrompt(cat,team,e){
  return `你是「${e.name}」,一位${e.role},隸屬「${team.name}」(${cat.name}領域)。你的招牌主張:「${e.take}」。
規則:用繁體中文(台灣用語),像懂行的人給朋友建議,專業但親切;必須站在「${e.role}」的立場與獨有視角回答,用行家才知道的具體細節或判斷標準證明專業,不要空泛大道理;100~150字,直接給觀點,不要客套開場或自我介紹;你只提供參考視角,不假裝有特定年資或證照,涉及醫療、投資、法律時提醒對方諮詢合格專業人士。`;
}
async function callAPI(system,user,maxTok){
  let res, raw;
  try{
        res=await fetch('https://expert-council.rhtm9y855y.workers.dev',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
           body:JSON.stringify({deviceId:getDeviceId(),consultId:(window.CUR_CONSULT||''),system,messages:[{role:'user',content:user}]})
    });

  }catch(netErr){
    throw new Error('請求送不出去('+(netErr&&netErr.name||'')+':'+(netErr&&netErr.message||'未知')+')。若用 App 內建瀏覽器,請改用 Safari 或 Chrome 開啟');
  }
  raw=await res.text();
  let data;
  try{ data=JSON.parse(raw); }
  catch(e){ throw new Error('回應無法解析:'+raw.slice(0,120)); }
  // API 回傳錯誤物件
  if(data.error){
    const m=data.error.message||'';
    if(res.status===401||/authentication|api key|x-api-key/i.test(m)) throw new Error('金鑰無效或未授權,請重新設定金鑰');
    if(res.status===429||/rate|overloaded/i.test(m)) throw new Error('請求過於頻繁或伺服器忙碌,稍候再試');
    if(res.status===400&&/credit|balance/i.test(m)) throw new Error('API 額度不足,請至 console 檢查');
    throw new Error('API 錯誤:'+(m||res.status));
  }
  if(!res.ok) throw new Error('連線失敗('+res.status+')');
  // 正常解析
  if(Array.isArray(data.content)){
    const txt=data.content.filter(b=>b&&b.type==='text').map(b=>b.text).join('\n').trim();
    if(txt) return txt;
  }
  throw new Error('回應格式異常:'+JSON.stringify(data).slice(0,120));
}
async function askOne(e,i,question){
  const tk=$('#team .take[data-take="'+i+'"]');
  tk.className='take';
  tk.innerHTML='<div class="think"><span class="dot"></span><span class="dot"></span><span class="dot"></span> 思考中</div>';
  try{
    const txt=await callAPI(personaPrompt(CUR.cat,CUR.t,e),question,512);
    tk.className='take';
    tk.innerHTML='<span class="q">“</span>'+(txt||'(無回應)').replace(/\n/g,'<br>');
    return {name:e.name,role:e.role,text:txt};
  }catch(err){ tk.innerHTML='<div class="err">⚠️ '+err.message+'</div>'; return null; }
}
async function askChief(question,answers){
  const chief=$('#chief');chief.className='chief show';
  chief.innerHTML=`<div class="ctop"><div class="cava">🎯</div><div><div class="cnm">團長彙整</div><div class="crl">${CUR.t.name} · 綜合五位顧問的觀點</div></div></div><div class="cthink"><span class="dot"></span><span class="dot"></span><span class="dot"></span> 正在收斂大家的建議…</div>`;
  const panel=answers.map(a=>`【${a.name}・${a.role}】${a.text}`).join('\n\n');
  const sys=`你是「${CUR.t.name}」(${CUR.cat.name}領域)的團長,主持這場決策會議。五位顧問已各自發表看法,請綜合收斂成可行動的結論。
格式(繁體中文台灣用語):先一兩句點出共識與主要分歧;接著「建議這樣做」給2~3個具體可執行步驟;最後一句提醒最該注意的風險或前提。約150~200字,語氣沉穩可靠,要提煉不要複述每個人的話,涉及醫療投資法律時提醒諮詢合格專業人士。`;
  try{
    const txt=await callAPI(sys,`使用者的問題:${question}\n\n五位顧問的回答:\n${panel}\n\n請做出團長彙整。`,700);
    chief.querySelector('.cthink').outerHTML='<div class="cbody">'+txt.replace(/\n/g,'<br>')+'</div>';
      try{
      const recs=JSON.parse(localStorage.getItem('ecDecisions')||'[]');
      recs.unshift({
        time:new Date().toLocaleString('zh-TW'),
        cat:CUR.cat.name,
        team:CUR.t.name,
        question:question,
        answers:answers.map(a=>({name:a.name,role:a.role,text:a.text})),
        chief:txt
      });
      localStorage.setItem('ecDecisions',JSON.stringify(recs.slice(0,50)));
    }catch(e){}

  }catch(err){ chief.querySelector('.cthink').outerHTML='<div class="cbody">⚠️ '+err.message+'</div>'; }
}
function bindAsk(){
  $('#setKey').onclick=()=>{$('#keyInput').value=getKey();$('#modal').classList.add('show');$('#keyInput').focus()};
  $('#send').onclick=async()=>{
    if(busy) return;
    const q=$('#q').value.trim();
    if(!q){$('#q').focus();return;}
    if(!getKey()){$('#setKey').click();return;}
    busy=true;const btn=$('#send');btn.disabled=true;btn.textContent='開會中…';
    $('#chief').className='chief';$('#hint').textContent='五位顧問正在針對你的問題給建議…';
            const ok=[]; window.CUR_CONSULT = Date.now()+'_'+Math.random().toString(36).slice(2);

    for(let i=0;i<CUR.t.experts.length;i++){
      const r=await askOne(CUR.t.experts[i],i,q);
      if(r) ok.push(r);
    }
    if(ok.length>=2){$('#hint').textContent='團長正在彙整大家的建議…';await askChief(q,ok);}
    btn.disabled=false;btn.textContent='再問一次';$('#hint').textContent='想換個問題?改寫上面再按一次';busy=false;
  };
}

function showDecisions(){
  const recs=JSON.parse(localStorage.getItem('ecDecisions')||'[]');
  let html='<div style="position:fixed;inset:0;z-index:10000;background:#0d1117;overflow-y:auto;padding:20px">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="color:#fff;margin:0">我的決策紀錄</h2><button onclick="this.closest(\'div\').parentElement.remove()" style="background:#333;color:#fff;border:none;border-radius:20px;padding:8px 16px">關閉</button></div>';
  if(recs.length===0){
    html+='<p style="color:#888">還沒有任何紀錄。問完一次「問問全團」後就會自動記錄在這裡。</p>';
  }else{
    recs.forEach(r=>{
      html+='<div style="background:#161b22;border-radius:12px;padding:16px;margin-bottom:12px">';
      html+='<div style="color:#5b8def;font-size:13px">'+r.time+' · '+r.cat+' · '+r.team+'</div>';
      html+='<div style="color:#fff;font-weight:600;margin:8px 0">'+r.question+'</div>';
      html+='<div style="color:#aaa;font-size:14px;line-height:1.6">'+(r.chief||'').replace(/\n/g,'<br>')+'</div>';
      html+='</div>';
    });
  }
  html+='</div>';
  const box=document.createElement('div');
  box.innerHTML=html;
  document.body.appendChild(box);
}
